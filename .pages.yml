backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  - name: "site"
    label: "サイト全体"
    files:
      - file: "content/site.json"
        name: "site"
        label: "サイト設定"
        fields:
          - { name: title, widget: string }
          - { name: hero_title, widget: string }
          - { name: hero_text, widget: text }
          - { name: hero_button, widget: string }
          - { name: about, widget: text }
          - { name: address, widget: string }
          - { name: tel, widget: string }
          - { name: contact_text, widget: text }
          - { name: reserve_button, widget: string }
          - { name: map_url, widget: string }
          - { name: footer, widget: string }

  - name: "menu"
    label: "メニュー"
    files:
      - file: "content/menu.json"
        name: "menu"
        label: "メニュー一覧"
        fields:
          - name: items
            widget: list
            fields:
              - { name: id, widget: string }
              - { name: name, widget: string }
              - { name: price, widget: string }
              - { name: description, widget: text }
